services:
  app:
    build: .
    container_name: physalis-dev
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://physalis:${DB_PASSWORD}@db:5432/physalis
    ports:
      - "${PORT:-3000}:3000"
    tmpfs:
      - /app/.next/cache
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  db:
    image: postgres:16-alpine
    container_name: physalis-db-dev
    restart: always
    environment:
      POSTGRES_USER: physalis
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: physalis
    ports:
      - "5432:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U physalis"]
      interval: 5s
      retries: 10

volumes:
  pg_data_dev:

networks:
  internal:
