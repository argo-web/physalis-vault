# .gitlab-ci.yml
#
# Déploiement OIDC depuis GitLab CI/CD — équivalent GitLab de deploy-oidc.yml.
#
# Aucun secret GitLab n'est utilisé. Le job demande un ID token OIDC (signé par
# GitLab) via le mot-clé `id_tokens`, et Physalis le valide contre une `Policy`
# avant de retourner le bundle de déploiement (secrets + creds SSH + path).
#
# ─── Pré-requis côté Physalis ────────────────────────────────────────────────
#
#   1. Connexion CI/CD (onglet org « CI/CD ») de provider « gitlab » :
#        - issuer : laisser vide pour gitlab.com, OU l'URL de l'instance pour
#          GitLab self-hosted (ex. https://gitlab.monentreprise.com)
#        - (optionnel) creds registry si l'image est tirée depuis un registre
#   2. Projet relié à cette connexion + repo = `project_path` GitLab
#        (ex. acme/web ou acme/team/web), dans les Paramètres du projet
#   3. Server (org) avec la clé SSH de la VPS + environnement lié + deployPath
#   4. Policy : (provider gitlab, project_path, environment CI, branche)
#        → (project, environment Physalis). Le champ « environment CI » de la
#        policy DOIT matcher le `environment: name:` déclaré ci-dessous.
#   5. Physalis accessible en HTTPS depuis le runner GitLab
#
# ─── Variables à adapter ─────────────────────────────────────────────────────
#
#   VAULT_URL       : URL de Physalis (ex. https://vault.physalis.cloud)
#   VAULT_AUDIENCE  : audience OIDC, doit matcher `OIDC_AUDIENCE` du vault
#   VAULT_PROJECT   : slug du projet dans le vault
#   VAULT_ENV       : environnement cible Physalis (production, staging, ...)

variables:
  VAULT_URL: "https://vault.physalis.cloud"
  VAULT_AUDIENCE: "vault.physalis.cloud"
  VAULT_PROJECT: "voyages"
  VAULT_ENV: "production"

stages:
  - deploy

deploy:
  stage: deploy
  image: alpine:latest
  # `environment.name` devient le claim OIDC `environment` → doit matcher le
  # champ « environment CI » de la Policy Physalis (ici "production").
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  # ID token OIDC. `aud` doit exactement matcher `OIDC_AUDIENCE` côté Physalis
  # (sinon rejet 401 wrong_audience).
  id_tokens:
    VAULT_OIDC_TOKEN:
      aud: "$VAULT_AUDIENCE"
  script:
    - apk add --no-cache curl jq openssh-client
    - set -eu
    - umask 077
    # ── 1. Bundle de déploiement ──────────────────────────────────────────
    - |
      response=$(curl -sf -X POST \
        -H "Authorization: Bearer ${VAULT_OIDC_TOKEN}" \
        -H "Content-Type: application/json" \
        -d "{\"project\":\"${VAULT_PROJECT}\",\"environment\":\"${VAULT_ENV}\"}" \
        "${VAULT_URL}/api/deploy")
      [ -n "$response" ] || { echo "ERROR: /api/deploy returned empty body"; exit 1; }

      TMP="$(mktemp -d)"
      printf '%s' "$response" > "$TMP/bundle.json"
      jq -r '.sshKey' "$TMP/bundle.json" > "$TMP/id_deploy"
      chmod 600 "$TMP/id_deploy"
      jq -r '.secrets | to_entries[] | "\(.key)=\(.value)"' "$TMP/bundle.json" > "$TMP/.env"
    # ── 2. Push .env + docker-compose + redeploy via SSH ──────────────────
    - |
      IP=$(jq -r '.serverIp'     "$TMP/bundle.json")
      SSH_USER=$(jq -r '.serverUser'   "$TMP/bundle.json")
      DPATH=$(jq -r '.deployPath'   "$TMP/bundle.json")
      REGISTRY_URL=$(jq -r '.registry.url // empty'  "$TMP/bundle.json")
      REGISTRY_USER=$(jq -r '.registry.user // empty' "$TMP/bundle.json")
      REGISTRY_PAT=$(jq -r '.registry.pat // empty'  "$TMP/bundle.json")

      SSH_OPTS="-i $TMP/id_deploy -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=$TMP/known_hosts"

      scp $SSH_OPTS "$TMP/.env" "$SSH_USER@$IP:$DPATH/.env.new"

      HAS_COMPOSE=0
      compose=$(jq -r '.dockerCompose // empty' "$TMP/bundle.json")
      if [ -n "$compose" ]; then
        printf '%s' "$compose" > "$TMP/docker-compose.yml"
        scp $SSH_OPTS "$TMP/docker-compose.yml" "$SSH_USER@$IP:$DPATH/docker-compose.yml.new"
        HAS_COMPOSE=1
      fi

      ssh $SSH_OPTS "$SSH_USER@$IP" \
        "DEPLOY_DIR='$DPATH' HAS_COMPOSE='$HAS_COMPOSE' REGISTRY_URL='$REGISTRY_URL' REGISTRY_USER='$REGISTRY_USER' REGISTRY_PAT='$REGISTRY_PAT' bash -s" <<'ENDSSH'
      set -eu
      cd "$DEPLOY_DIR"
      mv .env.new .env
      [ "$HAS_COMPOSE" = "1" ] && mv docker-compose.yml.new docker-compose.yml || true
      if [ -n "${REGISTRY_PAT:-}" ] && [ -n "${REGISTRY_USER:-}" ]; then
        printf '%s' "$REGISTRY_PAT" | docker login "${REGISTRY_URL:-ghcr.io}" -u "$REGISTRY_USER" --password-stdin
      fi
      docker compose pull
      docker compose up -d --no-build --remove-orphans
      docker image prune -f
      [ -n "${REGISTRY_URL:-}" ] && docker logout "$REGISTRY_URL" 2>/dev/null || true
      ENDSSH
    # ── 3. Cleanup ────────────────────────────────────────────────────────
    - rm -rf "$TMP"
  after_script:
    - rm -rf "${TMP:-/tmp/none}" 2>/dev/null || true
